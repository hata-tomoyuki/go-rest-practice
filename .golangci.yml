# golangci-lint 設定（ワークフローから --config=./golangci.yml で参照）
linters-settings:
  govet:
    check-shadowing: true
  gocyclo:
    min-complexity: 30
  misspell:
    locale: US
linters:
  disable-all: true
  enable:
    - goimports
    - deadcode
    - errcheck
    - gocognit
    - gocritic
    - gocyclo
    - gofmt
    - govet
    - misspell
    - staticcheck
    - whitespace
